<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Platform | Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="index.html">
        <span class="brand-dot"></span>
        <span>RAG PDF Studio</span>
      </a>
      <nav class="nav">
        <a href="index.html">Landing</a>
        <a href="home.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="response.html">Response</a>
      </nav>
      <div class="auth-nav" data-auth-nav></div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <p class="eyebrow">Create Account</p>
      <h1>Sign Up For RAG PDF Studio</h1>
      <p class="subtitle">Create an account and start using the upload and answer workflow.</p>
    </section>

    <section class="section auth-wrap">
      <article class="panel auth-panel">
        <h2>Sign Up</h2>
        <form id="signupForm">
          <div class="field">
            <label for="name">Full Name</label>
            <input id="name" type="text" placeholder="Your name" required>
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@example.com" required>
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Minimum 6 characters" minlength="6" required>
          </div>
          <button id="signupBtn" class="btn btn-primary" type="submit">Create Account</button>
        </form>
        <p id="signupStatus" class="status">Use a valid email and secure password.</p>
        <p class="status">Already have account? <a class="link-inline" href="login.html">Login</a></p>
      </article>
    </section>

    <p class="footer">Demo auth is local to your browser for this frontend prototype.</p>
  </main>

  <script src="script.js"></script>
  <script src="signup.js"></script>
</body>
</html>
